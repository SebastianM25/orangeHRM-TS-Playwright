name: Playwright Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      BASE_URL: ${{ secrets.BASE_URL != '' && secrets.BASE_URL || 'https://opensource-demo.orangehrmlive.com' }}
      LOGIN_PATH: ${{ secrets.LOGIN_PATH != '' && secrets.LOGIN_PATH || '/web/index.php/auth/login' }}
      DASHBOARD_PATH: ${{ secrets.DASHBOARD_PATH != '' && secrets.DASHBOARD_PATH || '/web/index.php/dashboard/index' }}
      ORANGE_USERNAME: ${{ secrets.ORANGE_USERNAME != '' && secrets.ORANGE_USERNAME || 'Admin' }}
      ORANGE_PASSWORD: ${{ secrets.ORANGE_PASSWORD != '' && secrets.ORANGE_PASSWORD || 'admin123' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
